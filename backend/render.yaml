services:
  # ── CONSOLIDATED SERVICE (API + Workers) ──
  # This combined setup works on Render's Free Tier
  - type: web
    name: ai-learning-platform-backend
    env: node
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    healthCheckPath: /api/health/live
    envVars:
      - key: PORT
        value: 5000
      - key: SERVICE_TYPE
        value: both # Runs both Web and Workers in one process
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: WORKER_CONCURRENCY
        value: 1 # Lower concurrency to fit in Free Tier memory limits
      - key: SESSION_SECRET
        generateValue: true
      - key: KEEP_ALIVE_INTERVAL
        value: 600000 # 10 minutes